<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro (Core)</title>
</head>

<body>
    <h1>Crear una cuenta de Discord</h1>
    <form>
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <br>
        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>
        </div>
        <br>
        <div>
            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo" name="correo" required>
        </div>
        <br>
        <div>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" required>
        </div>
        <br>
        <div>
            <label>Confirmar contraseña:</label>
            <input type="password" id="m.contraseña" name="n.contraseña" required>
        </div>
        <br>
        <div>
            <label for="nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="nacimiento" name="nacimiento" required>
        </div>
        <br>
        <div>
            <label>Genero:</label>
            <input type="radio" id="hombre" name="genero">
            <label for="hombre">Hombre</label>
            <input type="radio" id="mujer" name="genero">
            <label for="mujer">Mujer</label>
            <input type="radio" id="x" name="genero">
            <label for="x">Prefiero no decirlo</label>
        </div>
        <br>
        <div>
            <label for="mas">Descripción sobre ti:</label>
            <br>
            <textarea name="mas" id="mas" rows="4" cols="20"></textarea>
        </div>
        <br>
        <div>
            <label for="intereses">Selecciona tus intereses</label>
            <br>
            <select name="intereses" id="intereses" multiple>
                <option value="musica">Música</option>
                <option value="peliculas">Películas</option>
                <option value="deportes">Deportes</option>
                <option value="tecnologia">Tecnologia</option>
                <option value="videojuegos">Videojuegos</option>
            </select>
        </div>
        <br>
        <div>
            <input type="checkbox" id="aceptar" name="aceptar" required>
            <label for="aceptar">Al registrarte, aceptas los
                <a href="https://discord.com/terms">Términos y condiciones</a> de
                Discord</label>
        </div>
        <br>
        <div>
            <input type="submit" value="Registrarse">
        </div>
    </form>
</body>

</html>
