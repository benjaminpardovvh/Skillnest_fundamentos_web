<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Benjamin Pardo">
    <title>Pagina de perfil</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <h1>Perfil</h1>
        <nav class="nav">
            <a href="#">Inicio</a>
            <a href="#">Mi perfil</a>
            <a href="#">Conexiones</a>
            <div class="boton-cerrar">
                <a href="#">Cerrar sesión</a>
            </div>
        </nav>
    </header>
    <main class="container">
        <section class="perfil">
            <div class="contenido">
                <div class="color">
                    <img src="static/images/foto-perfil.png" alt="foto de perfil">
                </div>
                <div class="descripcion">
                    <h2>Jane Doe</h2>
                    <p>Bergen, Noruega</p>
                    <h3>Desarrolladora frontend</h3>
                    <h3>Conocimientos en HTML, CSS, JavaScript</h3>
                    <a href="#">⚙ Editar perfil</a>
                </div>
            </div>
        </section>
        <section class="barra">
            <div class="solicitud">
                <div class="encabezado">
                    <h2>solicitides de conexión</h2>
                    <button class="ver-mas">Ver todas</button>
                </div>
                <div class="perfil-ajeno">
                    <div class="row">
                        <img src="static/images/foto-perfil.png" alt="foto de perfil">
                        <p>Steve Jobs</p>
                    </div>
                </div>
                <div class="perfil-ajeno">
                    <div class="row">
                        <img src="static/images/foto-perfil.png" alt="foto de perfil">
                        <p>Bill Gates</p>
                    </div>
                </div>
            </div>
            <div class="conexiones">
                <div class="encabezado">
                    <h2>Tus conexiones</h2>
                    <button class="ver-mas">Ver todas</button>
                </div>
                <div class="perfil-ajeno">
                    <div class="row">
                        <img src="static/images/foto-perfil.png" alt="foto de perfil">
                        <p>Richard Stallman</p>
                    </div>
                </div>
                <div class="perfil-ajeno">
                    <div class="row">
                        <img src="static/images/foto-perfil.png" alt="foto de perfil">
                        <p>Linus Torvalds</p>
                    </div>
                </div>
                <div class="perfil-ajeno">
                    <div class="row">
                        <img src="static/images/foto-perfil.png" alt="foto de perfil">
                        <p>Ada Lovelace</p>
                    </div>
                </div>
                <div class="perfil-ajeno">
                    <div class="row">
                        <img src="static/images/foto-perfil.png" alt="foto de perfil">
                        <p>Grace Hopper</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
